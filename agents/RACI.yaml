# ============================================
# CROSS-FUNCTIONAL WORKFLOWS
# ============================================

agent_collaboration:
  description: "Agent-to-agent communication, help requests, escalations"
  responsible: "*"
  accountable: "*"
  consulted: []
  informed: []
  notes: "All agents can initiate collaboration; accountability depends on workflow context"

ticket_state_transition:
  description: "Move tickets through state machine (inbox → triage → backlog → etc.)"
  responsible: "*"
  accountable: "*"
  consulted: []
  informed: []
  notes: "Responsible agent depends on current state; see ticket-states.yaml"

