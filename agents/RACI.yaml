# FEATURE DEVELOPMENT WORKFLOWS
# ============================================

feature_implementation:
  description: "Standard feature development from user story to production"
  responsible: dev-agent
  accountable: po-agent
  consulted:
    - security-agent
    - devops-agent
    - ui-agent
  informed:
    - qa-agent
    - ops-agent
    - pm-agent
    - data-agent

