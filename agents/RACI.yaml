  description: "Complete feature delivery from proposal to production"
  responsible:
    - pm-agent
    - po-agent
    - dev-agent
    - qa-agent
    - devops-agent
    - ops-agent
  accountable: pm-agent
  consulted:
    - security-agent
    - data-agent
    - ui-agent
  informed: []
  notes: "Sequential handoffs with pm-agent accountable for overall delivery"

# ============================================
# ESCALATION PATHS
# ============================================

escalations:
  p0_incident:
    primary: ops-agent
    secondary: dev-agent
    executive: pm-agent

  security_breach:
    primary: security-agent
    secondary: ops-agent
    executive: pm-agent

  infrastructure_failure:
    primary: devops-agent
    secondary: ops-agent
    executive: pm-agent

  deployment_failure:
    primary: devops-agent
    secondary: dev-agent
    executive: ops-agent

  quality_issue:
    primary: qa-agent
    secondary: dev-agent
    executive: po-agent

# ============================================
# NOTES
# ============================================

notes:
  - "Accountable agent has final decision-making authority"
  - "Only ONE agent should be accountable per workflow"
  - "Responsible agents do the actual work"
  - "Consulted agents provide input BEFORE decisions"
  - "Informed agents are notified AFTER decisions"
  - "Use agent-messages/ for cross-agent communication"
  - "See TEAM.md for collaboration patterns and workflows"
  - "See ticket-states.yaml for state transition responsibilities"
