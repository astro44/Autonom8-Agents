# Autonom8-Agents Module Manifest
# Auto-discovery configuration for Core framework

type: agents
module_name: Autonom8-Agents
version: 1.0.0
description: "General-purpose AI agent definitions and playbooks"

# Canonical agents provided by this module (shared across all providers)
canonical_agents:
  - pm-agent
  - bug-miner
  - doc-fixer
  - flow-synthesizer
  - metrics-agent
  - prompt-tuner
  - devops-agent
  - smoke-test-agent
  - regression-test-agent
  - curious-qa-agent

# Provider-specific override agents
provider_overrides:
  claude:
    - brutal-critic-agent
    - framework-counter-agent
    - miner-executer
  gemini:
    - doc-summarizer-agent
    - test-generator-agent
    - validator-agent
  codex:
    - api-builder-agent
    - code-generator-agent
    - po-pm-agent
    - refactor-agent
  cursor:
    - diff-analyzer-agent
    - pr-drafter-agent
    - quick-fix-agent
  opencode:
    - diff-analyzer-agent
    - pr-drafter-agent
    - quick-fix-agent

# Directory paths for agent discovery
paths:
  canonical_agents: "agents"
  claude_overrides: ".claude/overrides"
  gemini_overrides: ".gemini/overrides"
  codex_overrides: ".codex/overrides"
  cursor_overrides: ".cursor/overrides"
  opencode_overrides: ".opencode/overrides"
  claude_manifest: ".claude/claude.md"
  gemini_manifest: ".gemini/gemini.md"
  codex_manifest: ".codex/codex.md"
  cursor_manifest: ".cursor/cursor.md"
  opencode_manifest: ".opencode/opencode.md"
  policies: "policies"
  schemas: "schemas"
  agent_index: "agent-index.json"

# Lookup order: Provider overrides first, then canonical fallback
# Pattern: .{provider}/overrides/{agent-id}.md || agents/**/{agent-id}.md

# Canonical agent details
canonical_agent_details:
  pm-agent:
    path: "agents/pm/pm-agent.md"
    policies:
      - "policies/pm/prioritization.yaml"
    schemas:
      - "schemas/pm/ticket-schema.json"
      - "schemas/pm/prioritization-schema.json"
    version: "1.0.0"
    risk_level: low

  devops-agent:
    path: "agents/devops/devops-agent.md"
    version: "1.0.0"
    risk_level: high
    capabilities:
      - terraform
      - terraformer
      - auto-remediation
      - rca

  smoke-test-agent:
    path: "agents/qa/smoke-test-agent.md"
    version: "1.0.0"
    risk_level: low

  regression-test-agent:
    path: "agents/qa/regression-test-agent.md"
    version: "1.0.0"
    risk_level: medium

  curious-qa-agent:
    path: "agents/qa/curious-qa-agent.md"
    version: "1.0.0"
    risk_level: medium

# Provider override details
provider_override_details:
  brutal-critic-agent:
    provider: claude
    path: ".claude/overrides/brutal-critic-agent.md"
    version: "1.0.0"
    risk_level: high

  framework-counter-agent:
    provider: claude
    path: ".claude/overrides/framework-counter-agent.md"
    version: "1.0.0"
    risk_level: low

  miner-executer:
    provider: claude
    path: ".claude/overrides/miner-executer.md"
    version: "1.0.0"
    risk_level: medium

  po-pm-agent:
    provider: codex
    path: ".codex/overrides/po-pm-agent.md"
    version: "1.0.0"
    risk_level: low

# Dependencies on other modules
dependencies:
  - module: Autonom8-Knowledge
    required: false
    reason: "Shared schemas and policies"

  - module: Autonom8-SecOps
    required: false
    reason: "Security-specific agents may reference SecOps policies"

# Integration hooks
hooks:
  pre_agent_load:
    - "scripts/validate-agent-schema.sh"
  post_agent_run:
    - "scripts/log-agent-execution.sh"

# Module metadata
metadata:
  maintainer: "Autonom8 Core Team"
  repository: "https://github.com/astro44/Autonom8-Agents"
  documentation: "https://docs.autonom8.dev/agents"
  license: "Proprietary"
  created: "2025-10-31"
  updated: "2025-10-31"
